<svg class="ornament" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 56" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  <!-- center daisy -->
  <g transform="translate(120 28)">
    <circle r="2.4" fill="currentColor" stroke="none"/>
    <g>
      <ellipse cx="0" cy="-7.5" rx="1.6" ry="4.2"/>
      <ellipse cx="5.3" cy="-5.3" rx="1.6" ry="4.2" transform="rotate(45)"/>
      <ellipse cx="7.5" cy="0" rx="4.2" ry="1.6"/>
      <ellipse cx="5.3" cy="5.3" rx="1.6" ry="4.2" transform="rotate(-45)"/>
      <ellipse cx="0" cy="7.5" rx="1.6" ry="4.2"/>
      <ellipse cx="-5.3" cy="5.3" rx="1.6" ry="4.2" transform="rotate(45)"/>
      <ellipse cx="-7.5" cy="0" rx="4.2" ry="1.6"/>
      <ellipse cx="-5.3" cy="-5.3" rx="1.6" ry="4.2" transform="rotate(-45)"/>
    </g>
  </g>
  <!-- left tendril -->
  <g>
    <path d="M108 28 C 92 22, 78 30, 60 24"/>
    <path d="M86 25 C 82 19, 78 19, 76 23"/>
    <path d="M70 27 C 66 21, 62 21, 60 25"/>
    <circle cx="60" cy="24" r="1.4" fill="currentColor" stroke="none"/>
    <circle cx="50" cy="26" r="0.9" fill="currentColor" stroke="none"/>
    <path d="M98 30 q -3 4 -7 3"/>
    <path d="M78 31 q -3 4 -7 3"/>
  </g>
  <!-- right tendril (mirror) -->
  <g transform="translate(240 0) scale(-1 1)">
    <path d="M108 28 C 92 22, 78 30, 60 24"/>
    <path d="M86 25 C 82 19, 78 19, 76 23"/>
    <path d="M70 27 C 66 21, 62 21, 60 25"/>
    <circle cx="60" cy="24" r="1.4" fill="currentColor" stroke="none"/>
    <circle cx="50" cy="26" r="0.9" fill="currentColor" stroke="none"/>
    <path d="M98 30 q -3 4 -7 3"/>
    <path d="M78 31 q -3 4 -7 3"/>
  </g>
  <!-- small accent dots far left/right -->
  <circle cx="30" cy="28" r="1" fill="currentColor" stroke="none"/>
  <circle cx="210" cy="28" r="1" fill="currentColor" stroke="none"/>
</svg>
